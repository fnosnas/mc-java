name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          npm install
          npm install -g pkg

      - name: Build Node Binary
        run: |
          # 此时我们将 Node 程序打包成 server.bin
          pkg index.js --targets node18-linux-x64 --output server.bin

      - name: Compile Java Launcher
        run: |
          # 编译 Java 代码并打包成真正的 server.jar
          javac Main.java
          jar cfe server.jar Main Main.class

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          files: |
            server.jar
            server.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
