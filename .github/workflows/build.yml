name: Xserver Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and Build Node
        run: |
          npm install
          npm install -g pkg
          pkg . --targets node18-linux-x64 --output server.bin --public

      - name: Build Java Wrapper
        run: |
          javac Main.java
          jar cfe server.jar Main Main.class

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          files: |
            server.jar
            server.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
